<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>poppata-bot · Guide</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --paper:#fff8ec;
    --ink:#141210;
    --ink-soft:#5c574e;
    --border:#141210;
    --bw:4px;
    --shadow:6px 6px 0 var(--border);

    --eat:#ff5d73;
    --sleep:#5b8def;
    --pee:#ffc93c;
    --poo:#a06a42;
    --weight:#3ddc97;

    --accent:var(--eat);
    --bubble-in:#ffffff;      /* bot / incoming */
    --bubble-out:#e4f4c9;     /* user / outgoing */
    --font-display:'Arial Black','Helvetica Neue',Impact,system-ui,sans-serif;
    --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font-body);
    background:
      repeating-linear-gradient(45deg,#0000 0 22px,#0000000a 22px 24px),
      var(--paper);
    color:var(--ink);
    display:flex;justify-content:center;align-items:stretch;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  .phone{
    position:relative;
    width:100%;max-width:440px;
    height:100dvh;
    background:var(--paper);
    border-left:var(--bw) solid var(--border);
    border-right:var(--bw) solid var(--border);
    display:flex;flex-direction:column;
    overflow:hidden;
    touch-action:none;
    user-select:none;-webkit-user-select:none;
  }

  /* progress bars */
  .bars{
    display:flex;gap:5px;
    padding:calc(env(safe-area-inset-top,0px) + 10px) 12px 8px;
    background:var(--accent);
    transition:background .25s ease;
  }
  .bar{flex:1;height:5px;background:#14121033;border:1px solid var(--ink)}
  .bar > i{display:block;height:100%;width:0;background:var(--ink)}
  .bar.done > i{width:100%}
  .bar.active > i{animation:fill linear forwards}
  @keyframes fill{from{width:0}to{width:100%}}

  /* header */
  header{
    background:var(--accent);
    border-bottom:var(--bw) solid var(--border);
    padding:2px 18px 16px;
    transition:background .25s ease;
  }
  .kicker{
    font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
    display:inline-block;background:var(--ink);color:var(--paper);
    padding:3px 8px;border:2px solid var(--ink);
  }
  header h1{
    font-family:var(--font-display);
    font-size:clamp(28px,8.5vw,40px);line-height:.94;
    text-transform:uppercase;letter-spacing:-.02em;
    margin-top:10px;
    text-shadow:3px 3px 0 var(--paper);
  }

  /* close */
  .close{
    position:absolute;top:calc(env(safe-area-inset-top,0px) + 8px);right:12px;
    z-index:5;display:none;
    width:34px;height:34px;border:3px solid var(--ink);background:var(--paper);
    font-size:18px;font-weight:900;line-height:1;cursor:pointer;
    align-items:center;justify-content:center;color:var(--ink);
  }
  .close:active{transform:translateY(2px)}

  /* chat area */
  .chat{
    flex:1;overflow-y:auto;
    padding:16px 14px 8px;
    display:flex;flex-direction:column;gap:9px;
    scrollbar-width:none;
  }
  .chat::-webkit-scrollbar{display:none}

  .row{display:flex;max-width:100%}
  .row.b{justify-content:flex-start}
  .row.u{justify-content:flex-end}

  .bubble{
    position:relative;
    max-width:80%;
    padding:9px 12px;
    font-size:14.5px;line-height:1.32;font-weight:500;
    white-space:pre-line;word-wrap:break-word;
    border:3px solid var(--ink);
    box-shadow:3px 3px 0 var(--ink);
    animation:pop .26s cubic-bezier(.2,.9,.3,1.2) both;
  }
  .row.b .bubble{background:var(--bubble-in);border-radius:16px 16px 16px 4px}
  .row.u .bubble{background:var(--bubble-out);border-radius:16px 16px 4px 16px}
  .bubble .tail{font-size:11px;font-weight:700;color:var(--ink-soft);margin-top:4px;display:block}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.94)}to{opacity:1;transform:none}}

  /* reaction chip on a user bubble */
  .react{
    position:absolute;bottom:-13px;right:8px;
    background:var(--paper);border:2px solid var(--ink);border-radius:20px;
    padding:1px 6px;font-size:13px;line-height:1.3;
    box-shadow:2px 2px 0 var(--ink);
    animation:reactpop .3s cubic-bezier(.2,.9,.3,1.4) both;
  }
  @keyframes reactpop{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:none}}

  /* typing dots */
  .typing{display:flex;gap:4px;align-items:center;padding:12px 14px}
  .typing span{
    width:8px;height:8px;background:var(--ink-soft);border-radius:50%;
    animation:blink 1.1s infinite ease-in-out both;
  }
  .typing span:nth-child(2){animation-delay:.18s}
  .typing span:nth-child(3){animation-delay:.36s}
  @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}

  /* centered divider between two message groups */
  .divider{
    align-self:center;max-width:90%;
    margin:4px 0;
    background:#14121012;border:2px solid var(--ink);border-radius:22px;
    padding:5px 13px;
    font-size:12.5px;font-weight:800;line-height:1.3;color:var(--ink-soft);text-align:center;
    animation:pop .26s cubic-bezier(.2,.9,.3,1.2) both;
  }

  /* inline keyboard (bot buttons) */
  .kb{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .kb-btn{
    background:var(--paper);border:2px solid var(--ink);border-radius:8px;
    padding:6px 11px;font-size:13px;font-weight:800;color:var(--ink);
    box-shadow:2px 2px 0 var(--ink);
  }

  /* caption / note */
  .note{
    border-top:var(--bw) solid var(--border);
    background:var(--accent);
    padding:20px 18px calc(env(safe-area-inset-bottom,0px) + 18px);
    transition:background .25s ease;
  }
  .note .txt{
    font-size:19px;font-weight:700;line-height:1.5;color:var(--ink);
  }
  .note .txt b{font-weight:900}
  .note .nav{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:10px;font-weight:900;font-size:22px;color:var(--ink);
  }
  .note .nav .step{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink)}
  .note .nav .chev{opacity:.9}
  .note .nav .chev.off{opacity:.2}
</style>
</head>
<body>
  <main class="phone" id="phone">
    <div class="close" id="close" aria-label="Close">✕</div>
    <div class="bars" id="bars"></div>
    <header>
      <span class="kicker" id="kicker">—</span>
      <h1 id="title">—</h1>
    </header>
    <div class="chat" id="chat"></div>
    <div class="note">
      <div class="txt" id="note">—</div>
      <div class="nav">
        <span class="chev" id="chevPrev">‹</span>
        <span class="step" id="step">1 / 1</span>
        <span class="chev" id="chevNext">›</span>
      </div>
    </div>
  </main>

<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };

  // topic -> accent variable
  var ACCENT = {
    intro:"--eat", start:"--eat", approval:"--pee", feed:"--eat", bottle:"--eat",
    fine:"--eat", sleep:"--sleep", diaper:"--pee", weight:"--weight",
    report:"--sleep", charts:"--weight", proposal:"--pee", undo:"--poo", tips:"--eat"
  };

  // Each turn: {who:'u'|'b', text, react?, buttons?, tail?}
  var CARDS = [
    { topic:"intro", kicker:"Welcome", title:"poppata-bot",
      chat:[
        {who:"b", text:"Hi! 👋 I keep your baby's diary: feeds, sleep, pee, poop, and weight."},
        {who:"b", text:"Write naturally in English. I'll take care of the rest."}
      ],
      note:"One baby per chat. This guide shows everything I can do — <b>tap right</b> to continue." },

    { topic:"start", kicker:"First step", title:"Activate the bot",
      chat:[
        {who:"u", text:"/start Mario"},
        {who:"b", text:"Hi! 👋 Bot activated in this chat.\n👶 Name: Mario"}
      ],
      note:"Or <b>add me to a group</b>: I activate myself. Change the name whenever you want with <b>/name Mario</b>." },

    { topic:"approval", kicker:"Access", title:"Wait for approval",
      chat:[
        {who:"u", text:"/start"},
        {who:"b", text:"📨 Access request sent! Wait for the administrator to approve it."},
        {who:"divider", text:"The admin receives a request 👇"},
        {who:"b", text:"📨 New access request\nRossi family (-100123)\nfrom Alberto", buttons:["Approve","Block"]}
      ],
      note:"On first activation I create an <b>admin approval request</b>. Once the admin approves the chat, use <b>/start</b> again and the bot is ready." },

    { topic:"feed", kicker:"Breastfeed", title:"Log a feed",
      chat:[
        {who:"u", text:"feed right 9.15", react:"👍"},
        {who:"divider", text:"Or interactively 👇"},
        {who:"u", text:"feed"},
        {who:"b", text:"Which breast? 🤱", buttons:["Left","Right"]},
        {who:"b", text:"Feed started at 10:32 — right breast"}
      ],
      note:"Side + exact time → quiet <b>👍 reaction</b>. If something is missing, I ask; without a time, I use the message time." },

    { topic:"bottle", kicker:"Bottle", title:"Formula milk",
      chat:[
        {who:"u", text:"bottle 100"},
        {who:"b", text:"🥛 Bottle 100 ml at 14:30 ✅"},
        {who:"divider", text:"Or interactively 👇"},
        {who:"u", text:"bottle"},
        {who:"b", text:"How many ml? 🥛"},
        {who:"u", text:"120"},
        {who:"b", text:"🥛 Bottle 120 ml at 16:05 ✅"}
      ],
      note:"Bottles are measured in <b>ml</b> and have no side — that's why they differ from breastfeeds. Write <b>bottle</b> and I ask for the amount." },

    { topic:"fine", kicker:"Closing", title:"End a session",
      chat:[
        {who:"u", text:"feed right 9.15", react:"👍"},
        {who:"u", text:"end 9.40"},
        {who:"b", text:"Ok, added ✅ — feed duration: 25m"},
        {who:"divider", text:"Even across midnight 👇"},
        {who:"u", text:"sleep 22", react:"👍"},
        {who:"u", text:"end 6.30"},
        {who:"b", text:"Ok, added ✅ — sleep duration: 8h 30m"}
      ],
      note:"<b>end</b> (or <b>end 9.40</b>) closes the open feed or sleep session and calculates the duration. It also works across midnight (sleep 22 → end 6.30)." },

    { topic:"sleep", kicker:"Sleep", title:"Sleep and conflicts",
      chat:[
        {who:"u", text:"sleep 22"},
        {who:"b", text:"Sleep started at 22:00"},
        {who:"u", text:"feed left"},
        {who:"b", text:"There is already an open sleep session since 22:00. Close it at 22:40 and start a feed?", buttons:["Confirm","Cancel"]}
      ],
      note:"If you start something while a session is already open, <b>I ask for confirmation</b> before closing it and starting the new one. This works both ways." },

    { topic:"diaper", kicker:"Diaper", title:"Pee and poop",
      chat:[
        {who:"u", text:"pee", react:"👍"},
        {who:"u", text:"poop", react:"👍"}
      ],
      note:"Instant events: a quiet <b>👍 reaction</b> and done. I also understand wee, poo, poopoo, and similar words." },

    { topic:"weight", kicker:"Weight", title:"Record weight",
      chat:[
        {who:"u", text:"/weight 3400"},
        {who:"b", text:"⚖️ Today's weight: 3400 g"},
        {who:"u", text:"/weight"},
        {who:"b", text:"📈 Weight history:\n7/7  3400 g\n5/7  3320 g"}
      ],
      note:"Record weight with <b>/weight</b> in grams, not as free text. <b>/weight</b> on its own shows the history." },

    { topic:"report", kicker:"Automatic reports", title:"Every morning",
      chat:[
        {who:"b", text:"📊 Yesterday — Mario\n😴 Sleep: 14h 20m\n🍼 Feeds: 3h 05m (7 — right 4, left 3)\n🥛 Bottle: 100 ml (1)\n💧 Pee: 6\n💩 Poop: 2"},
        {who:"u", text:"/report off"},
        {who:"b", text:"🔕 Automatic reports disabled."}
      ],
      note:"Every morning you receive yesterday's summary (and the weekly one). Turn reports off/on with <b>/report off</b> · <b>/report on</b>." },

    { topic:"charts", kicker:"Statistics", title:"/charts",
      chat:[
        {who:"u", text:"/charts"},
        {who:"b", text:"📊 Open the baby's statistics", buttons:["📊 Open stats"]}
      ],
      note:"<b>/charts</b> opens the mini app with charts for feeds, sleep, pee, poop, and weight." },

    { topic:"proposal", kicker:"Ideas and issues", title:"Suggest",
      chat:[
        {who:"u", text:"/suggest It would be useful to add a forgotten feed"},
        {who:"b", text:"Thanks, feedback sent."}
      ],
      note:"Use <b>/suggest</b> to send an idea, change, or problem to the admin. I include the chat and sender, so they can contact you if they need details." },

    { topic:"undo", kicker:"Oops, wrong", title:"Undo",
      chat:[
        {who:"u", text:"pee", react:"👍"},
        {who:"u", text:"poop", react:"👍"},
        {who:"u", text:"undo"},
        {who:"b", text:"Removed: poop at 10:05"},
        {who:"u", text:"undo"},
        {who:"b", text:"Removed: pee at 10:00"}
      ],
      note:"<b>undo</b> (or <b>/undo</b>) deletes <b>only the latest</b> saved event. Repeat to go further back, one event at a time." },

    { topic:"tips", kicker:"Good to know", title:"Tips & commands",
      chat:[
        {who:"u", text:"/status"},
        {who:"b", text:"Feed in progress since 16:20 (12m)"},
        {who:"u", text:"/today"},
        {who:"b", text:"📊 Today\n😴 Sleep: 5h 40m\n🍼 Feeds: 1h 15m (4 — right 2, left 2)\n🥛 Bottle: 120 ml (1)\n💧 Pee: 4\n💩 Poop: 1"},
        {who:"u", text:"/breast"},
        {who:"b", text:"Last feed: right breast — ended at 09:40 (2h 15m ago)"},
        {who:"u", text:"/schedule"},
        {who:"b", text:"📋 Today's schedule — 8/7\n\n06:30 🍼 right 06:30→06:55 (25m)\n08:00 💧 pee\n13:00 😴 13:00→14:15 (1h 15m)\n16:00 🥛 bottle 120 ml\n\nTotals: 🍼 1 · 🥛 120 ml · 😴 1h 15m · 💧 1 · 💩 0"}
      ],
      note:"Bare times → I choose the a.m./p.m. closest to the message time." }
  ];

  // timing (ms)
  var USER_LEAD = 520, BOT_LEAD = 420, TYPING = 850, REACT_DELAY = 480, DIVIDER_LEAD = 450, END_BUFFER = 2800, MIN_DUR = 4200;

  function cardDuration(card){
    var t = 0;
    card.chat.forEach(function(turn){
      if (turn.who === "b") t += BOT_LEAD + TYPING;
      else if (turn.who === "divider") t += DIVIDER_LEAD;
      else t += USER_LEAD;
      if (turn.react) t += REACT_DELAY;
    });
    return Math.round(Math.max(MIN_DUR, t + END_BUFFER) * 1.3);
  }

  var chatEl = $("chat"), barsEl = $("bars"), phoneEl = $("phone");
  var current = 0, gen = 0, timers = [], activeFill = null, lastUserBubble = null;

  function setAccent(topic){
    var v = ACCENT[topic] || "--eat";
    document.documentElement.style.setProperty("--accent", "var(" + v + ")");
  }

  function clearTimers(){
    timers.forEach(clearTimeout);
    timers = [];
  }

  function scrollBottom(){ chatEl.scrollTop = chatEl.scrollHeight; }

  function schedule(fn, delay, myGen){
    var id = setTimeout(function(){
      if (myGen !== gen) return;
      fn();
      scrollBottom();
    }, delay);
    timers.push(id);
  }

  function makeBubble(turn){
    var row = document.createElement("div");
    row.className = "row " + turn.who;
    var bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = turn.text;
    if (turn.buttons){
      var kb = document.createElement("div");
      kb.className = "kb";
      turn.buttons.forEach(function(b){
        var el = document.createElement("span");
        el.className = "kb-btn";
        el.textContent = b;
        kb.appendChild(el);
      });
      bubble.appendChild(kb);
    }
    row.appendChild(bubble);
    chatEl.appendChild(row);
    if (turn.who === "u") lastUserBubble = bubble;
    return bubble;
  }

  function addTyping(){
    var row = document.createElement("div");
    row.className = "row b typing-row";
    var t = document.createElement("div");
    t.className = "bubble typing";
    t.innerHTML = "<span></span><span></span><span></span>";
    row.appendChild(t);
    chatEl.appendChild(row);
  }
  function removeTyping(){
    var r = chatEl.querySelector(".typing-row");
    if (r) r.remove();
  }
  function addReaction(emoji){
    if (!lastUserBubble) return;
    var chip = document.createElement("span");
    chip.className = "react";
    chip.textContent = emoji;
    lastUserBubble.appendChild(chip);
  }

  function makeDivider(text){
    var d = document.createElement("div");
    d.className = "divider";
    d.textContent = text;
    chatEl.appendChild(d);
  }

  function playChat(card, myGen){
    chatEl.innerHTML = "";
    lastUserBubble = null;
    var t = 0;
    card.chat.forEach(function(turn){
      if (turn.who === "b"){
        t += BOT_LEAD;
        schedule(addTyping, t, myGen);
        t += TYPING;
        schedule(function(){ removeTyping(); makeBubble(turn); }, t, myGen);
      } else if (turn.who === "divider"){
        t += DIVIDER_LEAD;
        schedule(function(){ makeDivider(turn.text); }, t, myGen);
      } else {
        t += USER_LEAD;
        schedule(function(){ makeBubble(turn); }, t, myGen);
      }
      if (turn.react){
        t += REACT_DELAY;
        (function(em){ schedule(function(){ addReaction(em); }, t, myGen); })(turn.react);
      }
    });
  }

  function buildBars(index){
    barsEl.innerHTML = "";
    activeFill = null;
    for (var k = 0; k < CARDS.length; k++){
      var bar = document.createElement("div");
      bar.className = "bar";
      var fill = document.createElement("i");
      if (k < index){ bar.classList.add("done"); }
      else if (k === index){
        bar.classList.add("active");
        fill.style.animationDuration = cardDuration(CARDS[index]) + "ms";
        activeFill = fill;
      }
      bar.appendChild(fill);
      barsEl.appendChild(bar);
    }
    if (activeFill){
      var myGen = gen;
      activeFill.addEventListener("animationend", function(){
        if (myGen !== gen) return;
        if (current < CARDS.length - 1) show(current + 1);
      }, { once:true });
    }
  }

  function show(i){
    if (i < 0) i = 0;
    if (i > CARDS.length - 1) i = CARDS.length - 1;
    clearTimers();
    gen++;
    current = i;
    var card = CARDS[i];
    setAccent(card.topic);
    $("kicker").textContent = card.kicker;
    $("title").textContent = card.title;
    $("note").innerHTML = card.note;
    $("step").textContent = (i + 1) + " / " + CARDS.length;
    $("chevPrev").className = "chev" + (i === 0 ? " off" : "");
    $("chevNext").className = "chev" + (i === CARDS.length - 1 ? " off" : "");
    buildBars(i);
    playChat(card, gen);
  }

  function next(){ if (current < CARDS.length - 1) show(current + 1); }
  function prev(){ if (current > 0) show(current - 1); }
  function pause(){ if (activeFill) activeFill.style.animationPlayState = "paused"; }
  function resume(){ if (activeFill) activeFill.style.animationPlayState = "running"; }

  // pointer: hold to pause, tap sides to navigate, swipe to navigate
  var downX = 0, downY = 0, downT = 0;
  phoneEl.addEventListener("pointerdown", function(e){
    downX = e.clientX; downY = e.clientY; downT = Date.now();
    pause();
  });
  function endPointer(e){
    var dt = Date.now() - downT;
    var dx = e.clientX - downX, dy = e.clientY - downY;
    resume();
    if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)){
      dx < 0 ? next() : prev();
      return;
    }
    if (dt < 300 && Math.abs(dx) < 12 && Math.abs(dy) < 12){
      var rect = phoneEl.getBoundingClientRect();
      (e.clientX - rect.left) < rect.width * 0.32 ? prev() : next();
    }
  }
  phoneEl.addEventListener("pointerup", endPointer);
  phoneEl.addEventListener("pointercancel", resume);

  document.addEventListener("keydown", function(e){
    if (e.key === "ArrowRight" || e.key === " ") next();
    else if (e.key === "ArrowLeft") prev();
  });

  // Telegram Mini App niceties (no-op as a plain web page)
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg){ try { tg.ready(); tg.expand(); } catch (_e) {} }
  // Only a real Mini App (with initData) gets the in-app close/back controls;
  // opened as a plain URL the page relies on the browser's own chrome.
  if (tg && tg.initData){
    var closeEl = $("close");
    closeEl.style.display = "flex";
    closeEl.addEventListener("pointerdown", function(e){ e.stopPropagation(); });
    closeEl.addEventListener("click", function(e){ e.stopPropagation(); try { tg.close(); } catch (_e) {} });
    if (tg.BackButton){
      tg.BackButton.show();
      tg.BackButton.onClick(function(){ if (current > 0) prev(); else { try { tg.close(); } catch (_e) {} } });
    }
  }

  show(0);
})();
</script>
</body>
</html>
